<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ballet Dictionary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAF8;--bg2:#F2F1EE;--bg3:#E8E6E1;
  --text:#1A1A18;--text2:#6B6B68;--text3:#9E9E9A;
  --border:#E0DED8;--border2:#C8C6C0;
  --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#534AB7;
  --green:#1D9E75;--green-light:#E1F5EE;
  --red:#D85A30;--red-light:#FAECE7;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

/* ── Tab bar ── */
.tab-bar{display:flex;align-items:flex-end;padding:0 0 0 180px;border-bottom:1px solid var(--border);background:var(--bg);}
.tab{padding:10px 22px 9px;font-size:13px;color:var(--text2);cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:5px 5px 0 0;margin-right:3px;position:relative;bottom:-1px;background:var(--bg2);transition:all 0.12s;user-select:none;}
.tab:hover{color:var(--text);background:var(--bg);}
.tab.active{color:var(--text);font-weight:500;background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg);}

.tab-content{display:none;padding:1.25rem 0;}
.tab-content.active{display:block;}
.two-col{display:flex;}
.left-col{width:180px;flex-shrink:0;border-right:1px solid var(--border);}
.right-col{flex:1;min-width:0;padding-left:1.5rem;}

/* ── Task sidebar ── */
.task-sec-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;cursor:pointer;user-select:none;}
.task-sec-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.task-sec-arrow{font-size:9px;color:var(--text3);transition:transform .2s;}
.task-sec-arrow.open{transform:rotate(180deg);}
.task-sec-body{overflow:hidden;transition:max-height .2s ease;}
.task-sec-body.closed{max-height:0!important;}
.task-add-row{padding:4px 10px 6px;}
.task-add-input{width:100%;font-size:12px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);outline:none;padding:2px 0;display:none;font-family:inherit;}
.task-add-input.visible{display:block;}
.task-list{padding:0 10px 4px;}
.task-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;}
.task-cb:hover{border-color:var(--purple);}
.task-cb.done{background:var(--purple);border-color:var(--purple);}
.task-cb.done::after{content:"✓";font-size:9px;color:#fff;}
.task-text{font-size:12px;color:var(--text);line-height:1.4;}
.task-text.done{color:var(--text3);text-decoration:line-through;}
.task-empty{font-size:11px;color:var(--text3);padding:4px 0 8px;}
.task-resolved-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 4px;border-top:1px solid var(--border);cursor:pointer;user-select:none;margin-top:4px;}
.task-resolved-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.task-resolved-arrow{font-size:9px;color:var(--text3);transition:transform .2s;}
.task-resolved-arrow.open{transform:rotate(180deg);}
.task-resolved-body{overflow:hidden;transition:max-height .2s ease;}
.task-resolved-body.closed{max-height:0!important;}
.task-resolved-list{padding:0 10px 6px;}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cal-nav-btn{width:26px;height:26px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;}
.cal-nav-btn:hover{background:var(--bg2);}
.cal-months{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.25rem;}
.cal-month-title{font-size:12px;font-weight:500;color:var(--text);text-align:center;margin-bottom:8px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;padding:3px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);cursor:pointer;border-radius:50%;transition:background .12s;position:relative;}
.cal-day:hover{background:var(--bg2);}
.cal-day.empty{cursor:default;pointer-events:none;}
.cal-day.today{color:var(--purple-dark);font-weight:600;}
.cal-day.marked{background:var(--purple);color:#fff;}
.cal-day.marked:hover{background:var(--purple-dark);}
.cal-day.has-note::after{content:"";width:3px;height:3px;border-radius:50%;background:var(--green);position:absolute;bottom:2px;left:50%;transform:translateX(-50%);}
.cal-day.marked.has-note::after{background:rgba(255,255,255,.8);}

/* ── Stats ── */
.month-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:10px 8px;text-align:center;}
.stat-num{font-size:20px;font-weight:500;color:var(--text);}
.stat-label{font-size:10px;color:var(--text3);margin-top:2px;}

/* ── Note list ── */
.notes-section-title{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;}
.note-list{display:flex;flex-direction:column;gap:6px;}
.note-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;cursor:pointer;transition:border-color .15s;}
.note-card:hover{border-color:var(--border2);}
.note-date-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.note-date{font-size:12px;font-weight:500;color:var(--text);}
.note-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0;}
.note-field{margin-bottom:2px;}
.note-field-label{font-size:10px;color:var(--text3);}
.note-field-text{font-size:12px;color:var(--text2);margin-left:4px;line-height:1.5;}
.note-empty{text-align:center;padding:2rem 0;color:var(--text3);font-size:12px;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .18s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.5rem;width:460px;max-width:92vw;transform:translateY(8px);transition:transform .18s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
.modal-title{font-size:15px;font-weight:500;color:var(--text);}
.modal-close{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);border-radius:var(--radius);font-size:15px;}
.modal-close:hover{background:var(--bg2);}
.field-label{font-size:11px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px;margin-top:12px;}
.field-label:first-of-type{margin-top:0;}
textarea{width:100%;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;line-height:1.6;padding:7px 10px;resize:vertical;}
textarea:focus{outline:none;border-color:var(--purple);}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;}
.btn-delete{background:transparent;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:6px 0;font-family:inherit;}
.btn-delete:hover{text-decoration:underline;}
.modal-footer-right{display:flex;gap:8px;}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:inherit;}
.btn-cancel:hover{background:var(--bg2);}
.btn-save{background:var(--purple);border:none;color:#fff;padding:6px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:500;font-family:inherit;}
.btn-save:hover{background:var(--purple-dark);}

/* ── Vocab sidebar ── */
.vocab-sidebar{width:180px;flex-shrink:0;border-right:1px solid var(--border);overflow:hidden;transition:width .2s;position:relative;}
.vocab-sidebar.collapsed{width:32px;}
.sb-toggle{position:absolute;top:10px;right:6px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text3);border-radius:var(--radius);z-index:2;}
.sb-toggle:hover{background:var(--bg2);}
.sb-inner{padding:10px 8px 10px 10px;width:180px;}
.vocab-sidebar.collapsed .sb-inner{display:none;}
.collapsed-label{display:none;writing-mode:vertical-rl;font-size:11px;color:var(--text3);position:absolute;top:38px;left:50%;transform:translateX(-50%);white-space:nowrap;letter-spacing:.05em;}
.vocab-sidebar.collapsed .collapsed-label{display:block;}
.sec-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:3px 0;margin-bottom:4px;user-select:none;}
.sec-title{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;}
.sec-arrow{font-size:9px;color:var(--text3);transition:transform .2s;}
.sec-arrow.open{transform:rotate(180deg);}
.sec-body{overflow:hidden;transition:max-height .2s ease;}
.sec-body.closed{max-height:0!important;}
.sb-empty{font-size:11px;color:var(--text3);line-height:1.5;padding:5px 0 8px;}
.sb-item{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--border);}
.sb-item:last-child{border-bottom:none;}
.sb-check{width:13px;height:13px;border-radius:3px;background:var(--green-light);border:1px solid var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px;color:#085041;}
.sb-name{font-size:11px;color:var(--text);}
.sb-sub{font-size:10px;color:var(--text3);}
.sb-progress{margin-top:14px;padding-top:10px;border-top:1px solid var(--border);}
.prog-label{font-size:11px;color:var(--text3);margin-bottom:5px;}
.prog-bg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.prog-count{font-size:11px;color:var(--text2);margin-top:4px;}

/* ── Vocab main ── */
.search-row{display:flex;gap:8px;margin-bottom:.75rem;}
.search-row input{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;}
.search-row input:focus{border-color:var(--purple);}
.vocab-type-tabs{display:flex;gap:4px;margin-bottom:.75rem;}
.vtype-tab{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s;font-family:inherit;}
.vtype-tab:hover{background:var(--bg2);}
.vtype-tab.active{background:var(--purple-light);border-color:#AFA9EC;color:var(--purple-dark);}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;align-items:center;}
.filter-group{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s;font-family:inherit;}
.tag:hover{background:var(--bg2);}
.tag.active{background:var(--purple-light);border-color:#AFA9EC;color:var(--purple-dark);}
.vdivider{width:1px;background:var(--border);margin:0 3px;align-self:stretch;}
.results-count{font-size:12px;color:var(--text2);margin-bottom:.75rem;}
.vocab-section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.vocab-section-label span.count{font-size:10px;background:var(--bg2);padding:1px 6px;border-radius:8px;color:var(--text3);font-weight:400;letter-spacing:0;}
.vocab-section+.vocab-section{margin-top:1.5rem;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1.1rem;transition:border-color .12s;}
.card:hover{border-color:var(--border2);}
.card.expanded{border-color:#AFA9EC;}
.card.learned{border-color:var(--green);}
.card.concept-card{border-left:3px solid #AFA9EC;}
.card.concept-card.learned{border-left-color:var(--green);}
.card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.checkbox{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .12s;background:var(--bg);}
.checkbox:hover{border-color:var(--green);}
.checkbox.checked{background:var(--green);border-color:var(--green);}
.checkbox.checked::after{content:"✓";font-size:10px;color:#fff;font-weight:500;}
.card-title{flex:1;min-width:0;cursor:pointer;}
.french-name{font-size:14px;font-weight:500;color:var(--text);}
.japanese-name{font-size:11px;color:var(--text2);margin-top:1px;}
.chinese-name{font-size:10px;color:var(--text3);margin-top:1px;}
.purpose-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.purpose-独立{background:var(--green-light);color:#085041;}
.purpose-过渡{background:var(--red-light);color:#4A1B0C;}
.purpose-兼用{background:var(--purple-light);color:#26215C;}
.concept-type-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;background:var(--purple-light);color:#26215C;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.mini-tag{font-size:10px;padding:2px 6px;border-radius:7px;background:var(--bg2);color:var(--text2);}
.card-preview{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;}
.card-detail{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:none;}
.card.expanded .card-detail{display:block;}
.detail-section{margin-bottom:9px;}
.detail-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.detail-list{list-style:none;}
.detail-list li{font-size:12px;color:var(--text);line-height:1.6;padding-left:10px;position:relative;}
.detail-list li::before{content:"·";position:absolute;left:0;color:var(--text3);}
.combo-item{font-size:11px;padding:3px 7px;background:var(--bg2);border-radius:var(--radius);margin-bottom:3px;color:var(--text2);}
.related-item{font-size:11px;padding:2px 7px;background:var(--purple-light);color:var(--purple-dark);border-radius:var(--radius);margin-right:4px;margin-bottom:3px;display:inline-block;cursor:pointer;}
.related-item:hover{background:#CECBF6;}
.expand-hint{font-size:11px;color:var(--text3);margin-top:7px;cursor:pointer;}
.vempty{text-align:center;padding:2rem 0;color:var(--text2);font-size:13px;}

/* ── Mobile bottom nav ── */
.mobile-nav{display:none;}

/* ── Mobile drawer overlay ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg);border-right:1px solid var(--border);z-index:51;transform:translateX(-100%);transition:transform .22s ease;overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--border);}
.drawer-title{font-size:13px;font-weight:500;color:var(--text);}
.drawer-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:16px;border-radius:var(--radius);}
.drawer-close:hover{background:var(--bg2);}
.drawer-body{padding:8px 0 24px;}

/* ── Mobile task trigger button ── */
.mobile-task-btn{display:none;width:100%;text-align:left;padding:10px 16px;font-size:13px;color:var(--text2);background:var(--bg2);border:none;border-bottom:1px solid var(--border);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;}
.mobile-task-btn span.badge{background:var(--purple);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;}

@media(max-width:640px){
  body{font-size:15px;}

  /* tab bar — no left padding on mobile */
  .tab-bar{padding:0;position:sticky;top:0;z-index:40;background:var(--bg);}
  .tab{padding:10px 18px 9px;font-size:13px;}

  /* tab content padding */
  .tab-content{padding:.75rem 0;}

  /* hide desktop two-col, go single column */
  .two-col{flex-direction:column;}
  .left-col{display:none;}
  .right-col{padding-left:0;padding:0 12px;}
  .vocab-sidebar{display:none;}

  /* show mobile task button above calendar */
  .mobile-task-btn{display:flex;}

  /* calendar: single month only */
  .cal-months{grid-template-columns:1fr;}
  .cal-months > div:last-child{display:none;}
  .cal-nav{padding:0 4px;}
  .cal-day{font-size:13px;}
  .cal-dow{font-size:11px;}

  /* stats */
  .month-stats{gap:6px;}
  .stat-num{font-size:22px;}
  .stat-label{font-size:11px;}

  /* cards: single column */
  .card-grid{grid-template-columns:1fr;}
  .card{padding:.85rem 1rem;}

  /* search + filters full width */
  .search-row input{font-size:15px;padding:9px 12px;}
  .tag{font-size:13px;padding:5px 12px;}
  .vtype-tab{font-size:13px;padding:5px 14px;}

  /* modal full screen on mobile */
  .modal{width:100%;max-width:100%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;position:fixed;bottom:0;left:0;right:0;transform:translateY(100%);}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal-overlay{align-items:flex-end;}

  /* note cards */
  .note-card{padding:12px 14px;}
  .note-date{font-size:14px;}
  .note-field-text{font-size:13px;}

  /* bottom nav */
  .mobile-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    background:var(--bg);
    border-top:1px solid var(--border);
    z-index:40;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .mobile-nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:10px 0 8px;cursor:pointer;border:none;background:transparent;
    font-family:inherit;color:var(--text3);font-size:10px;letter-spacing:.03em;
    transition:color .12s;
  }
  .mobile-nav-btn.active{color:var(--purple);}
  .mobile-nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

  /* pad content so bottom nav doesn't cover it */
  .tab-content{padding-bottom:80px;}

  /* vocab sidebar — show as drawer on mobile */
  .mobile-vocab-sidebar-btn{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:var(--text2);
    background:var(--bg2);border:1px solid var(--border);
    border-radius:var(--radius);padding:5px 10px;
    cursor:pointer;font-family:inherit;margin-bottom:.75rem;
  }

  /* drawer内部复用sidebar样式 */
  .drawer .sb-inner{width:100%;padding:12px 14px;}
  .drawer .sb-progress{margin-top:16px;padding-top:12px;}
}
</style>
</head>
<body>

<!-- Mobile drawers -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="task-drawer">
  <div class="drawer-header">
    <span class="drawer-title">近期课题</span>
    <span class="drawer-close" onclick="closeDrawer()">✕</span>
  </div>
  <div class="drawer-body">
    <div style="padding:0 14px 8px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;">待解决</span>
      <span onclick="showAddInputDrawer()" style="width:22px;height:22px;border-radius:4px;border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text3);cursor:pointer;line-height:1">+</span>
    </div>

const allVocab=actions.length+concepts.length;

function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function hasContent(n){return n&&FIELDS.some(f=>n[f.key]);}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='notes')||(i===1&&t==='vocab')));
  document.getElementById('tab-notes').classList.toggle('active',t==='notes');
  document.getElementById('tab-vocab').classList.toggle('active',t==='vocab');
}
function switchVType(el){
  currentVType=el.dataset.vtype;
  document.querySelectorAll('.vtype-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('action-filters').style.display=currentVType==='concept'?'none':'flex';
  document.getElementById('concept-filters').style.display=currentVType==='action'?'none':'flex';
  renderVocab();
}
function shiftMonths(d){baseMonth=new Date(baseMonth.getFullYear(),baseMonth.getMonth()+d,1);renderCalendar();}
function renderCalendar(){
  const m1=new Date(baseMonth),m2=new Date(baseMonth.getFullYear(),baseMonth.getMonth()+1,1);
  document.getElementById('cal-range').textContent=`${m1.getFullYear()}年${MONTHS[m1.getMonth()]} — ${m2.getFullYear()}年${MONTHS[m2.getMonth()]}`;
  document.getElementById('cal-months').innerHTML=renderMonth(m1)+renderMonth(m2);
  updateStats();
}
function renderMonth(first){
  const y=first.getFullYear(),mo=first.getMonth(),last=new Date(y,mo+1,0).getDate(),dow=first.getDay();
  let h=`<div><div class="cal-month-title">${y}年${MONTHS[mo]}</div><div class="cal-grid">`;
  ['日','一','二','三','四','五','六'].forEach(d=>{h+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<dow;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=last;d++){
    const k=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    h+=`<div class="cal-day${k===todayKey?' today':''}${hasContent(notes[k])?' marked has-note':''}" onclick="clickDay('${k}')">${d}</div>`;
  }
  return h+`</div></div>`;
}
function clickDay(k){
  editingDate=k;
  const n=notes[k]||{},d=parseKey(k);
  document.getElementById('modal-title').textContent=`${d.getFullYear()}年${MONTHS[d.getMonth()]}${d.getDate()}日`;
  document.getElementById('field-class').value=n.cls||'';
  document.getElementById('field-new').value=n.newContent||'';
  document.getElementById('field-progress').value=n.progress||'';
  document.getElementById('field-improve').value=n.improve||'';
  document.getElementById('btn-delete').style.visibility=hasContent(n)?'visible':'hidden';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingDate=null;renderCalendar();renderNoteList();}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function saveNote(){
  if(!editingDate)return;
  const n={cls:document.getElementById('field-class').value.trim(),newContent:document.getElementById('field-new').value.trim(),progress:document.getElementById('field-progress').value.trim(),improve:document.getElementById('field-improve').value.trim()};
  if(FIELDS.some(f=>n[f.key]))notes[editingDate]=n; else delete notes[editingDate];
  persist();closeModal();
}
function deleteNote(){if(!editingDate)return;delete notes[editingDate];persist();closeModal();}
function updateStats(){
  const y=baseMonth.getFullYear(),mo=baseMonth.getMonth(),last=new Date(y,mo+1,0).getDate();
  let train=0,nc=0,streak=0,cur=0;
  for(let d=1;d<=last;d++){
    const k=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(hasContent(notes[k])){train++;cur++;streak=Math.max(streak,cur);}else cur=0;
    if(hasContent(notes[k]))nc++;
  }
  document.getElementById('stat-total').textContent=train;
  document.getElementById('stat-notes').textContent=nc;
  document.getElementById('stat-streak').textContent=streak;
}
function renderNoteList(){
  const list=document.getElementById('note-list');
  const entries=Object.entries(notes).filter(([,n])=>hasContent(n)).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!entries.length){list.innerHTML='<div class="note-empty">还没有笔记，点击日历上的日期开始记录</div>';return;}
  list.innerHTML=entries.map(([k,n])=>{
    const d=parseKey(k);
    return`<div class="note-card" onclick="clickDay('${k}')"><div class="note-date-row"><div class="note-dot"></div><div class="note-date">${d.getFullYear()}年${MONTHS[d.getMonth()]}${d.getDate()}日</div></div>${FIELDS.filter(f=>n[f.key]).map(f=>`<div class="note-field"><span class="note-field-label">${f.label}：</span><span class="note-field-text">${n[f.key]}</span></div>`).join('')}</div>`;
  }).join('');
}
function showAddInput(){const i=document.getElementById('task-add-input');i.classList.add('visible');i.focus();}
function handleAddTask(e){
  if(e.key==='Enter'){const i=document.getElementById('task-add-input'),t=i.value.trim();if(t){tasks.push({id:nextTaskId++,text:t,done:false});persist();renderTasks();}i.value='';i.classList.remove('visible');}
  else if(e.key==='Escape'){const i=document.getElementById('task-add-input');i.value='';i.classList.remove('visible');}
}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;persist();renderTasks();}}
function renderTasks(){
  const p=tasks.filter(t=>!t.done),d=tasks.filter(t=>t.done);
  document.getElementById('task-list').innerHTML=p.length?p.map(t=>`<div class="task-item"><div class="task-cb" onclick="toggleTask(${t.id})"></div><div class="task-text">${t.text}</div></div>`).join(''):'<div class="task-empty">还没有课题</div>';
  document.getElementById('resolved-list').innerHTML=d.length?d.map(t=>`<div class="task-item"><div class="task-cb done" onclick="toggleTask(${t.id})"></div><div class="task-text done">${t.text}</div></div>`).join(''):'<div class="task-empty">暂无</div>';
  if(resolvedOpen){const b=document.getElementById('resolved-body');b.style.maxHeight=b.scrollHeight+'px';}
}
function toggleTaskSec(){
  taskSecOpen=!taskSecOpen;
  const b=document.getElementById('task-sec-body'),a=document.getElementById('task-sec-arrow');
  if(taskSecOpen){b.classList.remove('closed');b.style.maxHeight=b.scrollHeight+'px';a.classList.add('open');}
  else{b.style.maxHeight=b.scrollHeight+'px';requestAnimationFrame(()=>b.classList.add('closed'));a.classList.remove('open');}
}
function toggleResolved(){
  resolvedOpen=!resolvedOpen;
  const b=document.getElementById('resolved-body'),a=document.getElementById('resolved-arrow');
  if(resolvedOpen){b.classList.remove('closed');b.style.maxHeight=b.scrollHeight+'px';a.classList.add('open');}
  else{b.style.maxHeight=b.scrollHeight+'px';requestAnimationFrame(()=>b.classList.add('closed'));a.classList.remove('open');}
}
function toggleSidebar(){
  const sb=document.getElementById('vocab-sidebar');sb.classList.toggle('collapsed');
  sb.querySelector('.sb-toggle').textContent=sb.classList.contains('collapsed')?'▶':'◀';
}
function toggleLearnedSec(){
  learnedSecOpen=!learnedSecOpen;
  const b=document.getElementById('sec-body'),a=document.getElementById('sec-arrow');
  if(learnedSecOpen){b.classList.remove('closed');b.style.maxHeight=b.scrollHeight+'px';a.classList.add('open');}
  else{b.style.maxHeight=b.scrollHeight+'px';requestAnimationFrame(()=>b.classList.add('closed'));a.classList.remove('open');}
}
function toggleFilter(el){
  const g=el.dataset.group,v=el.dataset.value;
  vFilters[g]=v;
  document.querySelectorAll(`[data-group="${g}"]`).forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderVocab();
}
function toggleLearn(key,e){
  e.stopPropagation();
  if(learned.has(key))learned.delete(key);else learned.add(key);
  persist();updateLearnedSidebar();renderVocab();
}
function toggleExpand(key){vExpanded=vExpanded===key?null:key;renderVocab();}
function jumpTo(french){
  const inA=actions.find(a=>a.french===french),inC=concepts.find(c=>c.french===french);
  if(inA){currentVType='all';document.querySelectorAll('.vtype-tab').forEach((t,i)=>t.classList.toggle('active',i===0));document.getElementById('action-filters').style.display='flex';document.getElementById('concept-filters').style.display='flex';}
  else if(inC){currentVType='concept';document.querySelectorAll('.vtype-tab').forEach((t,i)=>t.classList.toggle('active',i===2));document.getElementById('action-filters').style.display='none';document.getElementById('concept-filters').style.display='flex';}
  document.getElementById('search').value=french;vExpanded=french;renderVocab();
}
function updateLearnedSidebar(){
  const pct=Math.round(learned.size/allVocab*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-count').textContent=`${learned.size} / ${allVocab} 个词条`;
  const all=[...actions,...concepts].filter(v=>learned.has(v.french));
  document.getElementById('learned-list').innerHTML=all.length?all.map(v=>`<div class="sb-item"><div class="sb-check">✓</div><div><div class="sb-name">${v.french}</div><div class="sb-sub">${v.japanese}</div></div></div>`).join(''):'<div class="sb-empty">勾选后显示</div>';
  const b=document.getElementById('sec-body');if(learnedSecOpen)b.style.maxHeight=b.scrollHeight+'px';
}
function makeCard(v,isConcept){
  const key=v.french,sk=key.replace(/'/g,"\\'"),isExp=vExpanded===key,isL=learned.has(key);
  const badge=isConcept?`<span class="concept-type-badge">${v.ctype}</span>`:`<span class="purpose-badge purpose-${v.purpose}">${v.purpose==='独立'?'独立':v.purpose==='过渡'?'过渡':'兼用'}</span>`;
  const tags=isConcept?'':`<div class="card-tags"><span class="mini-tag">${v.body}</span><span class="mini-tag">${v.type}</span></div>`;
  const det=isConcept
    ?`<div class="detail-section"><div class="detail-label">核心解释</div><div style="font-size:12px;color:var(--text);line-height:1.6">${v.explanation}</div></div><div class="detail-section"><div class="detail-label">在动作中如何体现</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${v.example}</div></div>${v.note?`<div class="detail-section"><div class="detail-label">备注</div><div style="font-size:11px;color:var(--text3)">${v.note}</div></div>`:''}`
    :`<div class="detail-section"><div class="detail-label">动作要点</div><ul class="detail-list">${v.points.map(p=>`<li>${p}</li>`).join('')}</ul></div><div class="detail-section"><div class="detail-label">常见变形与连接</div>${v.combos.map(c=>`<div class="combo-item">${c}</div>`).join('')}</div>${v.note?`<div class="detail-section"><div class="detail-label">备注</div><div style="font-size:11px;color:var(--text3)">${v.note}</div></div>`:''}`;
  const rel=v.related&&v.related.length?`<div class="detail-section"><div class="detail-label">关联词条</div><div>${v.related.map(r=>`<span class="related-item" onclick="jumpTo('${r}')">${r}</span>`).join('')}</div></div>`:'';
  return`<div class="card${isExp?' expanded':''}${isL?' learned':''}${isConcept?' concept-card':''}"><div class="card-header"><div class="checkbox${isL?' checked':''}" onclick="toggleLearn('${sk}',event)"></div><div class="card-title" onclick="toggleExpand('${sk}')"><div class="french-name">${v.french}</div><div class="japanese-name">${v.japanese}</div>${v.chinese?`<div class="chinese-name">${v.chinese}</div>`:''}</div>${badge}</div>${tags}<div class="card-preview" onclick="toggleExpand('${sk}')">${v.preview}</div><div class="card-detail">${det}${rel}</div><div class="expand-hint" onclick="toggleExpand('${sk}')">${isExp?'▲ 收起':'▼ 展开详情'}</div></div>`;
}
function renderVocab(){
  const q=document.getElementById('search').value.toLowerCase();
  const fa=currentVType!=='concept'?actions.filter(v=>{
    const ms=!q||v.french.toLowerCase().includes(q)||v.japanese.includes(q)||(v.chinese&&v.chinese.includes(q));
    return ms&&(vFilters.purpose==='all'||v.purpose===vFilters.purpose)&&(vFilters.body==='all'||v.body===vFilters.body)&&(vFilters.type==='all'||v.type===vFilters.type);
  }):[];
  const fc=currentVType!=='action'?concepts.filter(v=>{
    const ms=!q||v.french.toLowerCase().includes(q)||v.japanese.includes(q)||(v.chinese&&v.chinese.includes(q));
    return ms&&(vFilters.ctype==='all'||v.ctype===vFilters.ctype);
  }):[];
  document.getElementById('results-count').textContent=`共 ${fa.length+fc.length} 个词条`;
  let h='';
  if(fa.length)h+=`<div class="vocab-section"><div class="vocab-section-label">动作词条 <span class="count">${fa.length}</span></div><div class="card-grid">${fa.map(v=>makeCard(v,false)).join('')}</div></div>`;
  if(fc.length)h+=`<div class="vocab-section"><div class="vocab-section-label">概念词条 <span class="count">${fc.length}</span></div><div class="card-grid">${fc.map(v=>makeCard(v,true)).join('')}</div></div>`;
  if(!h)h='<div class="vempty">没有找到匹配的词条</div>';
  document.getElementById('vocab-output').innerHTML=h;
}

renderCalendar();renderNoteList();renderVocab();renderTasks();updateLearnedSidebar();

// ── Mobile support ──
const isMobile=()=>window.innerWidth<=640;

function initMobile(){
  const mobile=isMobile();
  document.getElementById('mobile-task-row').style.display=mobile?'block':'none';
  document.getElementById('mobile-vocab-row').style.display=mobile?'block':'none';
}

// override switchTab to also update bottom nav
const _switchTab=switchTab;
window.switchTab=function(t){
  _switchTab(t);
  document.getElementById('nav-notes').classList.toggle('active',t==='notes');
  document.getElementById('nav-vocab').classList.toggle('active',t==='vocab');
};

// drawer functions
function openDrawer(){
  document.getElementById('task-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow='hidden';
  renderTasksDrawer();
}
function closeDrawer(){
  document.getElementById('task-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function openVocabDrawer(){
  document.getElementById('vocab-drawer').classList.add('open');
  document.getElementById('vocab-drawer-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeVocabDrawer(){
  document.getElementById('vocab-drawer').classList.remove('open');
  document.getElementById('vocab-drawer-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function showAddInputDrawer(){
  const i=document.getElementById('task-add-input-drawer');
  i.style.display='block';i.focus();
}
function handleAddTaskDrawer(e){
  if(e.key==='Enter'){const i=document.getElementById('task-add-input-drawer'),t=i.value.trim();if(t){tasks.push({id:nextTaskId++,text:t,done:false});persist();renderTasks();renderTasksDrawer();updateMobileTaskBadge();}i.value='';i.style.display='none';}
  else if(e.key==='Escape'){const i=document.getElementById('task-add-input-drawer');i.value='';i.style.display='none';}
}

function renderTasksDrawer(){
  const p=tasks.filter(t=>!t.done),d=tasks.filter(t=>t.done);
  const tl=document.getElementById('task-list-drawer');
  const rl=document.getElementById('resolved-list-drawer');
  if(!tl||!rl)return;
  tl.innerHTML=p.length?p.map(t=>`<div class="task-item" style="padding:8px 0;"><div class="task-cb" onclick="toggleTaskAndSync(${t.id})" style="width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;"></div><div style="font-size:13px;color:var(--text);line-height:1.4;">${t.text}</div></div>`).join(''):'<div style="font-size:12px;color:var(--text3);padding:6px 0 10px;">还没有课题</div>';
  rl.innerHTML=d.length?d.map(t=>`<div class="task-item" style="padding:8px 0;"><div onclick="toggleTaskAndSync(${t.id})" style="width:18px;height:18px;border-radius:4px;border:1.5px solid var(--purple);background:var(--purple);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;">✓</div><div style="font-size:13px;color:var(--text3);text-decoration:line-through;">${t.text}</div></div>`).join(''):'<div style="font-size:12px;color:var(--text3);padding:6px 0;">暂无</div>';
}

function toggleTaskAndSync(id){
  const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;persist();renderTasks();renderTasksDrawer();updateMobileTaskBadge();}
}

function updateMobileTaskBadge(){
  const pending=tasks.filter(t=>!t.done).length;
  const badge=document.getElementById('mobile-task-badge');
  if(badge){badge.style.display=pending>0?'inline':'none';badge.textContent=pending;}
}

// override updateLearnedSidebar to also update drawer
const _updateLearnedSidebar=updateLearnedSidebar;
window.updateLearnedSidebar=function(){
  _updateLearnedSidebar();
  const pct=Math.round(learned.size/allVocab*100);
  const pf=document.getElementById('prog-fill-drawer');
  const pc=document.getElementById('prog-count-drawer');
  const ll=document.getElementById('learned-list-drawer');
  const mc=document.getElementById('mobile-learned-count');
  if(pf)pf.style.width=pct+'%';
  if(pc)pc.textContent=`${learned.size} / ${allVocab} 个词条`;
  if(mc)mc.textContent=`${learned.size} 个`;
  if(ll){
    const all=[...actions,...concepts].filter(v=>learned.has(v.french));
    ll.innerHTML=all.length?all.map(v=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);"><div style="width:14px;height:14px;border-radius:3px;background:var(--green-light);border:1px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:8px;color:#085041;flex-shrink:0;">✓</div><div><div style="font-size:12px;color:var(--text);">${v.french}</div><div style="font-size:10px;color:var(--text3);">${v.japanese}</div></div></div>`).join(''):'<div style="font-size:11px;color:var(--text3);padding:5px 0 8px;">勾选词条后显示</div>';
  }
};

window.addEventListener('resize',initMobile);
initMobile();
updateMobileTaskBadge();
</script>
</body>
</html>
